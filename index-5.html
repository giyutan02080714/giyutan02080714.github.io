<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>週邊清單</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1e23">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="週邊清單">
    <link rel="apple-touch-icon" href="/icon_512.png">
    <style>
        :root { 
            --main-blue: #5c7a91; --bg-active: #1a1e23; --bg-archive: #0d1117;
            --card-bg: #252a31; --accent-blue: #4a6982; --accent-green: #3d6350; 
            --price-green: #a6e3a1; 
            --text-bright: #bbb;
            --stat-pending: #6b7280;
            --stat-shipping: #4a7c6b;
            --stat-arrived: #4a6982;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-active); color: #eee; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; padding-bottom: 90px; min-height: 100vh; transition: background 0.3s ease; }

        /* Toast 提示 */
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: #3d6350; color: #fff; padding: 10px 22px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 9999; pointer-events: none; white-space: nowrap; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* 日幣標籤 */
        .jpy-tag { font-size: 11px; color: #8eb3cf; font-weight: normal; margin-left: 4px; }

        /* 空狀態 */
        .empty-state { text-align: center; color: #444; margin-top: 60px; line-height: 2; }
        .empty-state .empty-icon { font-size: 36px; display: block; margin-bottom: 8px; }
        .empty-state .empty-hint { font-size: 13px; color: #3d6350; }
        
        /* 導覽列 */
        .tab-nav { display: flex; gap: 8px; margin-bottom: 0; align-items: center; position: sticky; top: 0; z-index: 100; background: inherit; padding: 5px 0 0 0; }
        .tab { background: transparent; color: #666; border: none; padding: 8px 15px 10px; font-weight: bold; font-size: 14px; position: relative; transition: color 0.2s; }
        .tab.active { color: #fff; }
        /* Tab 底線滑動指示器 */
        .tab-nav::after { content: ''; position: absolute; bottom: 0; height: 2px; background: var(--main-blue); border-radius: 2px; transition: left 0.25s ease-out, width 0.25s ease-out; }
        #tab-indicator { position: absolute; bottom: 0; height: 2px; background: var(--main-blue); border-radius: 2px; transition: left 0.25s ease-out, width 0.25s ease-out; }
        .tab-nav-wrapper { position: sticky; top: 0; z-index: 100; background: inherit; margin-bottom: 4px; }
        .tab-nav-inner { display: flex; align-items: center; border-bottom: 1px solid #2a2f38; position: relative; padding-bottom: 0; }
        .icon-group { display: flex; align-items: center; gap: 15px; margin-left: auto; padding-bottom: 8px; }

        /* 搜尋欄 */
        #search-container { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, opacity 0.25s ease; opacity: 0; padding: 0 2px; }
        #search-container.open { max-height: 52px; opacity: 1; }
        #search-input { width: 100%; padding: 8px 12px; background: #1e2530; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 14px; margin: 6px 0 4px 0; box-sizing: border-box; }
        
        /* 頁面滑動 */
        #page-wrapper { display: flex; width: 200%; transition: transform 0.3s ease-out; margin-top: 8px; }
        .page-content { width: 50%; padding: 0 4px; flex-shrink: 0; }

        /* 卡片與側滑 - 已在測試頁驗證的結構 */
        .card-wrap { margin-bottom: 0; }
        .swipe-container { position: relative; margin-bottom: 0; }
        .swipe-area { position: relative; border-radius: 16px; overflow: hidden; background: #000; width: 100%; }
        .swipe-container.pinned-container > .swipe-area { box-shadow: 0 -2px 12px rgba(140,180,220,0.18), 0 8px 24px rgba(0,0,0,0.5); }
        .swipe-btns { position: absolute; right: 0; top: 0; bottom: 0; width: 160px; display: flex; z-index: 1; gap: 0; padding: 0; margin: 0; }
        .action-btn { width: 80px !important; min-width: 80px !important; max-width: 80px !important; flex: 0 0 80px !important; border: none; color: white; font-weight: bold; font-size: 14px; padding: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; white-space: nowrap; }
        .action-done { background: #2e5470; }
        .action-del { background: #2e5c47; }
        .detail-box { background: #131720; border-radius: 0 0 16px 16px; max-height: 0; overflow: hidden; transition: max-height 0.35s ease-out; margin-bottom: 12px; }
        .detail-box.open { max-height: 800px; }
        .detail-inner { padding: 15px; border-top: 1px solid #2a3040; transform: translateY(-8px); opacity: 0; transition: transform 0.3s ease-out, opacity 0.3s ease; }
        .detail-box.open .detail-inner { transform: translateY(0); opacity: 1; }
        .no-detail-gap { margin-bottom: 12px; }
        .card { background: var(--card-bg); padding: 14px; position: relative; z-index: 2; transition: transform 0.2s ease; display: flex; gap: 12px; min-height: 80px; }
        .card.pinned { background: var(--card-bg); }
        .img-box { width: 65px; height: 65px; background: #1e2329; border-radius: 10px; flex-shrink: 0; border: 1px solid #333; display: flex; align-items: center; justify-content: center; overflow: hidden; color: #666; font-size: 12px; cursor: pointer; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { flex: 1; min-width: 0; }
        .title-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; }
        .title { font-size: 18px; font-weight: bold; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 75%; }
        .src-text { font-size: 11px; color: var(--text-bright); border-left: 1px solid #444; padding-left: 6px; }
        .date-text { font-size: 12px; color: var(--text-bright); margin: 2px 0; }
        .price-text { color: var(--price-green); font-size: 16px; font-weight: bold; margin-top: 4px; }
        
        /* 狀態標籤：半透明填充 + 對應亮色文字 */
        .stat-tag { position: absolute; top: 10px; right: 12px; font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; letter-spacing: 0.3px; }
        .stat-pending { color: #b0b8c4; background: rgba(107,114,128,0.25); }
        .stat-shipping { color: #7dd4bc; background: rgba(74,124,107,0.3); }
        .stat-arrived { color: #7db3cf; background: rgba(74,105,130,0.3); }

        .ctrl-group { position: absolute; bottom: 6px; right: 4px; display: flex; gap: 2px; }
        .btn-icon { background: none; border: none; color: #666; font-size: 20px; padding: 8px; transition: transform 0.25s ease; min-width: 36px; min-height: 36px; display: flex; align-items: center; justify-content: center; }
        .btn-icon.open { transform: rotate(180deg); }
        
        .detail-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; color: #eee; }
        .dai-tag { border: 1px solid var(--main-blue); color: var(--main-blue); padding: 0 3px; border-radius: 3px; font-size: 10px; margin-right: 6px; }
        .note-area { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #444; font-size: 13px; color: var(--text-bright); }

        /* 彈窗動畫：從底部滑上 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0); display: none; z-index: 2000; overflow-y: auto; transition: background 0.25s ease; align-items: flex-start; }
        .overlay.show { background: rgba(0,0,0,0.85); }
        /* 刪除確認彈窗：置中縮放 */
        #del-modal { align-items: center; justify-content: center; }
        #del-modal .modal { transform: scale(0.92); opacity: 0; transition: transform 0.22s ease-out, opacity 0.2s ease; margin: 0; border-radius: 16px; }
        #del-modal.show .modal { transform: scale(1); opacity: 1; }
        /* 排序彈窗：置中，從上滑入 */
        #sort-modal { align-items: center; justify-content: center; }
        #sort-modal .modal { transform: translateY(-20px) scale(0.97); opacity: 0; transition: transform 0.25s ease-out, opacity 0.22s ease; margin: 0; }
        #sort-modal.show .modal { transform: translateY(0) scale(1); opacity: 1; }
        /* 編輯彈窗：從底部滑上 */
        #edit-modal { align-items: flex-end; justify-content: center; }
        #edit-modal .modal { width: 100%; border-radius: 16px 16px 0 0; transform: translateY(100%); opacity: 1; transition: transform 0.3s ease-out; max-height: 92vh; overflow-y: auto; margin: 0; }
        #edit-modal.show .modal { transform: translateY(0); }
        /* 設定彈窗：從頂部滑下 */
        #cfg-modal { align-items: flex-start; justify-content: center; }
        #cfg-modal .modal { width: 100%; border-radius: 0 0 16px 16px; transform: translateY(-100%); opacity: 1; transition: transform 0.3s ease-out; max-height: 92vh; overflow-y: auto; margin: 0; }
        #cfg-modal.show .modal { transform: translateY(0); }
        .modal { background: #252a31; width: 94%; padding: 18px; border-radius: 12px; }
        .modal h3 { margin: 0 0 15px 0; font-size: 18px; }
        
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #1a1e23; border: 1px solid #333; color: #fff; border-radius: 6px; font-size: 14px; }
        .row-group { display: flex; gap: 8px; }
        
        .add-btn-container { display: flex; justify-content: flex-end; margin: 5px 0 15px 0; }
        .add-link { background: #3a4752; color: #adc5d9; font-size: 12px; text-decoration: none; padding: 4px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        .cfg-btn-export { flex: 1; background: #3a4752; color: #adc5d9; padding: 10px; border: none; border-radius: 6px; font-weight: bold; }
        .cfg-btn-import { flex: 1; background: #324a41; color: #a1c7b9; padding: 10px; border: none; border-radius: 6px; font-weight: bold; }

        /* 置頂卡片 CSS 見下方 */

        /* 封存區年份分組 */
        .year-group { margin-bottom: 8px; }
        .year-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #0d1117; border: 1px solid #2a3040; border-radius: 10px; margin-bottom: 8px; cursor: pointer; user-select: none; transition: background 0.2s; }
        .year-header:active { background: #141b24; }
        .year-header-left { font-size: 14px; font-weight: bold; color: #8eb3cf; display: flex; align-items: center; gap: 6px; }
        .year-arrow { display: inline-block; transition: transform 0.25s ease; font-style: normal; }
        .year-arrow.open { transform: rotate(180deg); }
        .year-header-right { font-size: 12px; color: #555; }
        .year-body { display: none; overflow: visible; }
        .year-body.open { display: block; height: auto !important; }

        .field-label { font-size: 11px; color: #888; margin: 10px 0 3px 2px; letter-spacing: 0.5px; }
        .section-label { font-size: 13px; font-weight: bold; color: var(--main-blue); margin-bottom: 8px; }

        .fab { position: fixed; bottom: 25px; right: 25px; width: 56px; height: 56px; background: var(--accent-green); color: white; border-radius: 50%; border: none; font-size: 28px; z-index: 999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .fab:active { transform: scale(0.93); box-shadow: 0 2px 6px rgba(0,0,0,0.3); }

        /* 緊湊模式切換按鈕 */
        .compact-toggle { background: transparent; border: 1px solid #333; border-radius: 6px; color: #666; padding: 3px 8px; font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
        .compact-toggle.active { background: #2a3240; border-color: var(--main-blue); color: #8eb3cf; }

        /* 緊湊模式卡片 */
        .card-compact { background: var(--card-bg); border-radius: 10px; margin-bottom: 5px; display: flex; align-items: center; padding: 8px 4px 8px 10px; }
        .cc-bar { width: 4px; height: 36px; border-radius: 4px; flex-shrink: 0; margin-right: 10px; }
        .cc-bar-pending  { background: var(--stat-pending); }
        .cc-bar-shipping { background: var(--stat-shipping); }
        .cc-bar-arrived  { background: var(--stat-arrived); }
        .cc-body { flex: 1; min-width: 0; margin-right: 8px; }
        .cc-name { font-size: 15px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cc-sub  { font-size: 11px; color: #666; margin-top: 3px; white-space: nowrap; }
        .cc-sep  { color: #333; margin: 0 5px; }
        .cc-price { width: 80px; text-align: right; font-size: 14px; font-weight: bold; color: var(--price-green); white-space: nowrap; flex-shrink: 0; }
        .cc-btns { width: 56px; display: flex; align-items: center; justify-content: flex-end; flex-shrink: 0; }
        .cc-btn  { background: none; border: none; color: #666; font-size: 16px; padding: 4px 5px; cursor: pointer; transition: transform 0.2s; }
        .cc-btn.open { transform: rotate(180deg); }
        .cc-placeholder { width: 26px; flex-shrink: 0; }

        /* 緊湊細項展開 */
        .detail-compact { background: #131720; border-radius: 0 0 10px 10px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; margin-bottom: 5px; }
        .detail-compact.open { max-height: 500px; }
        .detail-compact .detail-inner { padding: 12px; border-top: 1px solid #2a3040; opacity: 1; transform: none; }

        /* 模式顯示控制 */
        .mode-compact .swipe-container { display: none; }
        .mode-compact .detail-box { display: none; }
        .mode-normal .card-compact { display: none; }
        .mode-normal .detail-compact { display: none; }
    </style>
</head>
<body onload="init()">
    <div class="tab-nav-wrapper">
        <div class="tab-nav-inner">
            <button id="t-act" class="tab active" onclick="jumpTab('active')">進行中</button>
            <button id="t-arc" class="tab" onclick="jumpTab('archive')">已封存</button>
            <div id="tab-indicator"></div>
            <div class="icon-group">
                <button class="compact-toggle" id="compact-btn" onclick="toggleCompact()">緊湊</button>
                <div onclick="toggleSearch()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                </div>
                <div id="sort-icon" onclick="toggleSortMenu()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><path d="M11 5h10M11 9h7M11 13h4M3 17l3 3 3-3M6 18V4"/></svg>
                </div>
                <div onclick="openConfig()"><svg width="22" height="22" viewBox="0 0 24 24" fill="#666"><path d="M12 15.5c1.93 0 3.5-1.57 3.5-3.5s-1.57-3.5-3.5-3.5-3.5 1.57-3.5 3.5 1.57 3.5 3.5 3.5zm7.32-2.5c.05-.5.05-1 .05-1.5s0-1-.05-1.5l2.09-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65A.488.488 0 0 0 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.12.22-.07.49.12.64L4.68 10c-.05.5-.05 1-.05 1.5s0 1 .05 1.5l-2.09 1.63c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.31.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.22.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64L19.32 13z"/></svg></div>
            </div>
        </div>
        <div id="search-container">
            <input type="text" id="search-input" placeholder="搜尋" oninput="filterSearch(this.value)">
        </div>
    </div>

    <div id="page-wrapper" class="mode-normal">
        <div id="list-active" class="page-content"></div>
        <div id="list-archive" class="page-content"></div>
    </div>

    <button class="fab" onclick="openEdit(null)">+</button>
    <div id="toast"></div>

    <!-- 排序彈窗：點背景關閉，stopPropagation 防止冒泡 -->
    <div id="sort-modal" class="overlay" onclick="overlayClick(event,'sort-modal')">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>排序方式</h3>
            <button id="sort-btn-new" onclick="setSort('new')" style="width:100%;padding:15px;margin:5px 0;background:#333;color:white;border:none;border-radius:10px;">建立日期 (新→舊)</button>
            <button id="sort-btn-old" onclick="setSort('old')" style="width:100%;padding:15px;margin:5px 0;background:#333;color:white;border:none;border-radius:10px;">建立日期 (舊→新)</button>
            <button id="sort-btn-pre-new" onclick="setSort('pre-new')" style="width:100%;padding:15px;margin:5px 0;background:#333;color:white;border:none;border-radius:10px;">預購日期 (新→舊)</button>
            <button id="sort-btn-pre-old" onclick="setSort('pre-old')" style="width:100%;padding:15px;margin:5px 0;background:#333;color:white;border:none;border-radius:10px;">預購日期 (舊→新)</button>
        </div>
    </div>

    <!-- 編輯彈窗：點背景關閉 -->
    <div id="edit-modal" class="overlay" onclick="overlayClick(event,'edit-modal')">
        <div class="modal" onclick="event.stopPropagation()">
            <!-- 標題列：左側標題，右側置頂 -->
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:15px;">
                <h3 id="edit-modal-title" style="margin:0; font-size:18px;">編輯事件</h3>
                <label style="display:flex; align-items:center; gap:7px; font-size:13px; cursor:pointer; color:#aaa; white-space:nowrap;">
                    <input type="checkbox" id="in-pin" style="width:16px;height:16px;margin:0;accent-color:#555;"> 置頂卡片
                </label>
            </div>

            <!-- 事件名稱 -->
            <div class="field-label">事件名稱</div>
            <input type="text" id="in-name" placeholder="">

            <!-- 來源 + 狀態 -->
            <div class="row-group" style="gap:10px;">
                <div style="flex:2;">
                    <div class="field-label">預購來源</div>
                    <select id="in-src" style="margin:0;"></select>
                </div>
                <div style="flex:1;">
                    <div class="field-label">狀態</div>
                    <select id="in-stat" style="margin:0;"><option>待出貨</option><option>運送中</option><option>已到貨</option></select>
                </div>
            </div>

            <!-- 預購日期 -->
            <div class="field-label">預購日期</div>
            <input type="date" id="in-date" style="margin:0 0 5px 0;">

            <!-- 圖片連結 -->
            <div class="field-label">圖片連結</div>
            <input type="text" id="in-img" placeholder="https://...">

            <!-- 購買網址 -->
            <div class="field-label">購買網址</div>
            <input type="text" id="in-link" placeholder="https://...">

            <!-- 分隔線 -->
            <div style="border-top:1px solid #333; margin:14px 0 10px 0;"></div>

            <!-- 個人購買項目 -->
            <div class="section-label">個人購買項目</div>
            <div id="me-rows"></div>
            <div class="add-btn-container"><span class="add-link" onclick="addRow('me-rows')">+ 新增項目</span></div>

            <!-- 分隔線 -->
            <div style="border-top:1px solid #333; margin:4px 0 10px 0;"></div>

            <!-- 代購項目 -->
            <div class="section-label">代購項目</div>
            <div id="dai-rows"></div>
            <div class="add-btn-container"><span class="add-link" onclick="addRow('dai-rows')">+ 新增代購</span></div>

            <!-- 分隔線 -->
            <div style="border-top:1px solid #333; margin:4px 0 10px 0;"></div>

            <!-- 幣別 -->
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px;">
                <div class="field-label" style="margin:0; white-space:nowrap;">幣別</div>
                <select id="in-cur" style="width:110px; margin:0;"><option value="TWD">TWD</option><option value="JPY">JPY</option></select>
            </div>
            <textarea id="in-note" placeholder="備註..." style="height:60px; margin:0 0 14px 0;"></textarea>

            <div style="display:flex; gap:10px;">
                <button onclick="closeModal('edit-modal')" style="flex:1; padding:12px; background:#444; color:white; border:none; border-radius:8px;">取消</button>
                <button id="save-btn" onclick="saveItem()" style="flex:1; padding:12px; background:var(--main-blue); color:white; border:none; border-radius:8px;">儲存</button>
            </div>
        </div>
    </div>

    <!-- 刪除確認彈窗 -->
    <div id="del-modal" class="overlay" onclick="overlayClick(event,'del-modal')">
        <div class="modal" onclick="event.stopPropagation()" style="text-align:center;">
            <div style="font-size:28px;margin-bottom:10px;">🗑</div>
            <h3 style="margin:0 0 8px 0;">確認刪除</h3>
            <p id="del-name" style="color:#bbb;font-size:14px;margin:0 0 20px 0;"></p>
            <p style="color:#888;font-size:12px;margin:0 0 20px 0;">刪除後無法復原</p>
            <div style="display:flex;gap:10px;">
                <button onclick="closeModal('del-modal')" style="flex:1;padding:12px;background:#333;color:white;border:none;border-radius:8px;">取消</button>
                <button id="del-confirm-btn" style="flex:1;padding:12px;background:#7a3030;color:white;border:none;border-radius:8px;">確認刪除</button>
            </div>
        </div>
    </div>

    <!-- 設定彈窗：點背景關閉 -->
    <div id="cfg-modal" class="overlay" onclick="overlayClick(event,'cfg-modal')">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>系統設定</h3>
            <label>匯率 (JPY->TWD)</label><input type="number" id="cfg-rate" step="0.001">
            <label>來源列表 (逗號分隔)</label><textarea id="cfg-srcs" style="height:80px;"></textarea>
            <div style="display:flex; gap:10px; margin:10px 0;">
                <button onclick="exportData()" class="cfg-btn-export">匯出備份</button>
                <button onclick="importData()" class="cfg-btn-import">匯入還原</button>
            </div>
            <div id="last-backup-hint" style="font-size:12px;color:#666;margin-bottom:8px;text-align:center;"></div>
            <button onclick="saveConfig()" style="width:100%; padding:15px; background:var(--main-blue); color:white; border:none; border-radius:8px; margin-top:10px;">儲存並關閉</button>
        </div>
    </div>

    <script>
        var db, cfg;
        try {
            db = JSON.parse(localStorage.getItem('merch_v28_db') || '[]');
            cfg = JSON.parse(localStorage.getItem('merch_v28_cfg') || '{"rate":0.22,"srcs":"幽浮官網, Aniplex, 噗浪, 社團, 代購","sort":"new"}');
        } catch(e) {
            db = [];
            cfg = {rate: 0.22, srcs: '幽浮官網, Aniplex, 噗浪, 社團, 代購', sort: 'new'};
        }
        var curTab = 'active';
        var searchOpen = false;
        var editId = null;

        function esc(s) {
            return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        function save() {
            try {
                localStorage.setItem('merch_v28_db', JSON.stringify(db));
            } catch(e) {
                showToast('⚠ 儲存失敗，請匯出備份');
            }
        }

        // Toast 提示
        var toastTimer = null;
        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2000);
        }

        // 更新排序按鈕高亮
        function updateSortUI() {
            var keys = ['new','old','pre-new','pre-old'];
            keys.forEach(function(k) {
                var btn = document.getElementById('sort-btn-' + k);
                if (btn) btn.style.background = (cfg.sort === k) ? 'var(--main-blue)' : '#333';
            });
        }

        function init() {
            updateSortUI();
            setupSwipe();
            render();
            applyCompactMode();
            // 初始化 Tab 指示器位置
            setTimeout(function() {
                var activeBtn = document.getElementById('t-act');
                var indicator = document.getElementById('tab-indicator');
                if (indicator && activeBtn) {
                    indicator.style.left = activeBtn.offsetLeft + 'px';
                    indicator.style.width = activeBtn.offsetWidth + 'px';
                }
            }, 50);
        }

        var justCollapsed = false; // 保留變數避免參考錯誤，但不再使用

        function setupSwipe() {
            document.addEventListener('touchstart', function(e) {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, {passive: true});

            document.addEventListener('touchend', function(e) {
                var dx = e.changedTouches[0].clientX - startX;
                var dy = e.changedTouches[0].clientY - startY;
                if (Math.abs(dx) > 120 && Math.abs(dy) < 50) {
                    if (dx > 0 && curTab === 'archive') jumpTab('active');
                    else if (dx < 0 && curTab === 'active') jumpTab('archive');
                }
            }, {passive: true});

            // 點空白處收回所有側滑卡片
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.swipe-container')) {
                    document.querySelectorAll('.card').forEach(function(c) {
                        c.style.transition = 'transform 0.2s';
                        c.style.transform = 'translateX(0px)';
                        c.dataset.slid = '0';
                    });
                }
            });
        }

        function jumpTab(t) {
            curTab = t;
            document.getElementById('page-wrapper').style.transform = (t === 'active' ? 'translateX(0)' : 'translateX(-50%)');
            document.body.style.background = (t === 'active' ? 'var(--bg-active)' : 'var(--bg-archive)');
            document.getElementById('t-act').className = (t === 'active' ? 'tab active' : 'tab');
            document.getElementById('t-arc').className = (t === 'archive' ? 'tab active' : 'tab');
            // Tab 指示器
            var activeBtn = document.getElementById(t === 'active' ? 't-act' : 't-arc');
            var indicator = document.getElementById('tab-indicator');
            if (indicator && activeBtn) {
                indicator.style.left = activeBtn.offsetLeft + 'px';
                indicator.style.width = activeBtn.offsetWidth + 'px';
            }
        }

        function render() {
            var sorted = [...db];

            // 先一般排序（只針對進行中非置頂卡片）
            var pinned = sorted.filter(function(x) { return !x.done && x.pin; });
            var unpinned = sorted.filter(function(x) { return !x.done && !x.pin; });
            var archived = sorted.filter(function(x) { return x.done; });

            if (cfg.sort === 'new') {
                unpinned.reverse();
            } else if (cfg.sort === 'old') {
                // 保持原始順序
            } else if (cfg.sort === 'pre-new' || cfg.sort === 'pre-old') {
                var sortByDate = function(arr) {
                    arr.sort(function(a, b) {
                        var da = parseInt(
                            (a.yy || '0000').replace('年', '') +
                            (a.mm || '00').replace('月', '').padStart(2, '0') +
                            (a.dd || '00').replace('日', '').padStart(2, '0')
                        );
                        var dbv = parseInt(
                            (b.yy || '0000').replace('年', '') +
                            (b.mm || '00').replace('月', '').padStart(2, '0') +
                            (b.dd || '00').replace('日', '').padStart(2, '0')
                        );
                        return cfg.sort === 'pre-new' ? dbv - da : da - dbv;
                    });
                };
                sortByDate(pinned);
                sortByDate(unpinned);
            }

            var actList = pinned.concat(unpinned);

            var arcMap = {};
            // 封存區依封存時間排序（最新封存在上）
            archived.sort(function(a, b) { return (b.doneAt || 0) - (a.doneAt || 0); });
            archived.forEach(function(it) {
                // 用預購年份分組（沒填就歸「未設定」）
                var yr = (it.yy || '').replace('年','') || '未設定';
                if (!arcMap[yr]) arcMap[yr] = [];
                arcMap[yr].push(it);
            });

            // 3. 進行中數量
            document.getElementById('t-act').textContent = '進行中（' + actList.length + '）';

            function buildCard(it) {
                var totalVal = 0, detailH = '';
                var hasDetail = ((it.me && it.me.length > 0) || (it.dai && it.dai.length > 0) || it.note);

                if (it.me) it.me.forEach(function(m) {
                    totalVal += (m.p * m.q);
                    detailH += '<div class="detail-row"><span>' + esc(m.n) + ' (x' + esc(String(m.q)) + ')</span><span>' + m.p.toLocaleString() + '</span></div>';
                });
                if (it.dai) it.dai.forEach(function(d) {
                    totalVal += (d.p * d.q);
                    detailH += '<div class="detail-row" style="color:var(--main-blue)"><span><span class="dai-tag">代</span>' + esc(d.n) + ' (x' + esc(String(d.q)) + ')</span><span>' + d.p.toLocaleString() + '</span></div>';
                });
                if (it.note) detailH += '<div class="note-area">備註：' + esc(it.note) + '</div>';

                // 4. 日幣顯示：NT xxx 元（JPY xxx）
                var priceH;
                if (it.cur === 'JPY') {
                    var twd = Math.round(totalVal * cfg.rate);
                    priceH = 'NT ' + twd.toLocaleString() + ' 元<span class="jpy-tag">（JPY ' + totalVal.toLocaleString() + '）</span>';
                } else {
                    priceH = 'NT ' + totalVal.toLocaleString() + ' 元';
                }

                var dateStr = (it.yy || '') + (it.mm || '') + (it.dd || '');

                // 狀態標籤：空值不渲染
                var statHtml = '';
                if (it.stat) {
                    var statClass = 'stat-tag ';
                    if (it.stat === '待出貨') statClass += 'stat-pending';
                    else if (it.stat === '運送中') statClass += 'stat-shipping';
                    else if (it.stat === '已到貨') statClass += 'stat-arrived';
                    else statClass += 'stat-pending';
                    statHtml = '<div class="' + statClass + '">' + esc(it.stat) + '</div>';
                }

                // 搜尋用文字：名稱 + 來源 + 個人購買項目名稱 + 代購項目名稱
                var searchText = [it.name, it.src];
                if (it.me) it.me.forEach(function(m) { searchText.push(m.n); });
                if (it.dai) it.dai.forEach(function(d) { searchText.push(d.n); });

                // 緊湊版日期：只顯示月日
                var mm = (it.mm || '').replace('月', '');
                var dd = (it.dd || '').replace('日', '');
                var compactDate = mm ? (mm + '月' + (dd ? dd + '日' : '')) : '';

                // 緊湊版價格：不含「元」
                var compactPrice = it.cur === 'JPY'
                    ? 'NT ' + Math.round(totalVal * cfg.rate).toLocaleString()
                    : 'NT ' + totalVal.toLocaleString();

                // 緊湊版狀態色塊
                var ccBarClass = 'cc-bar ';
                if (it.stat === '運送中') ccBarClass += 'cc-bar-shipping';
                else if (it.stat === '已到貨') ccBarClass += 'cc-bar-arrived';
                else ccBarClass += 'cc-bar-pending';

                var compactCard =
                    '<div class="card-compact" onclick="toggleCompactBox(\'' + esc(it.id) + '\')" style="' + (!hasDetail ? 'cursor:default;' : 'cursor:pointer;') + '">' +
                        '<div class="' + ccBarClass + '"></div>' +
                        '<div class="cc-body">' +
                            '<div class="cc-name">' + esc(it.name) + '</div>' +
                            '<div class="cc-sub">' + esc(it.src) + (compactDate ? '<span class="cc-sep">|</span>' + compactDate : '') + '</div>' +
                        '</div>' +
                        '<span class="cc-price">' + compactPrice + '</span>' +
                        '<div class="cc-btns">' +
                            (hasDetail ? '<button class="cc-btn" id="cc-arrow-' + esc(it.id) + '" onclick="event.stopPropagation();toggleCompactBox(\'' + esc(it.id) + '\')">∨</button>' : '<div class="cc-placeholder"></div>') +
                            '<button class="cc-btn" onclick="event.stopPropagation();openEdit(\'' + esc(it.id) + '\')">✎</button>' +
                        '</div>' +
                    '</div>' +
                    (hasDetail ? '<div class="detail-compact" id="cc-box-' + esc(it.id) + '"><div class="detail-inner">' + detailH + '</div></div>' : '');

                return '<div class="swipe-container' + (it.pin ? ' pinned-container' : '') + '" data-search="' + esc(searchText.join(' ')) + '">' +
                    '<div class="swipe-area">' +
                        '<div class="swipe-btns">' +
                            '<button class="action-btn action-done" data-id="' + esc(it.id) + '" onclick="toggleDone(this.dataset.id)">' + (it.done ? '還原' : '封存') + '</button>' +
                            '<button class="action-btn action-del" data-id="' + esc(it.id) + '" onclick="delItem(this.dataset.id)">刪除</button>' +
                        '</div>' +
                        '<div class="card' + (it.pin ? ' pinned' : '') + '" id="card-' + esc(it.id) + '" ontouchstart="cs(event)" ontouchmove="cm(event,\'' + esc(it.id) + '\')" ontouchend="ce(event,\'' + esc(it.id) + '\')" style="' + (hasDetail ? 'cursor:pointer;' : '') + '">' +
                            statHtml +
                            '<div class="img-box" data-link="' + esc(it.link) + '" onclick="event.stopPropagation();if(this.dataset.link) window.open(this.dataset.link)">' +
                                (it.img ? '<img src="' + esc(it.img) + '" alt="">' : esc(it.src)) +
                            '</div>' +
                            '<div class="info">' +
                                '<div class="title-row"><span class="title">' + esc(it.name) + '</span><span class="src-text">' + esc(it.src) + '</span></div>' +
                                '<div class="date-text">' + esc(dateStr) + '</div>' +
                                '<div class="price-text">' + priceH + '</div>' +
                            '</div>' +
                            '<div class="ctrl-group">' +
                                (it.pin ? '<span class="pin-icon btn-icon" style="cursor:default;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v3.76z"/></svg></span>' : '') +
                                (hasDetail ? '<button class="btn-icon btn-toggle" data-id="' + esc(it.id) + '" onclick="event.stopPropagation();toggleBox(this.dataset.id)">∨</button>' : '') +
                                '<button class="btn-icon" data-id="' + esc(it.id) + '" onclick="event.stopPropagation();openEdit(this.dataset.id)">✎</button>' +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                    (hasDetail ? '<div id="box-' + esc(it.id) + '" class="detail-box"><div class="detail-inner">' + detailH + '</div></div>' : '') +
                    '<div class="no-detail-gap"></div>' +
                '</div>' +
                compactCard;
            }

            // 進行中列表
            var actH = actList.map(buildCard).join('');
            document.getElementById('list-active').innerHTML = actH ||
                '<div class="empty-state"><span class="empty-icon">📦</span>無進行中項目<br><span class="empty-hint">點右下角 + 新增第一筆</span></div>';

            // 封存區年份分組
            var arcYears = Object.keys(arcMap).sort(function(a, b) {
                var na = Number(a), nb = Number(b);
                if (isNaN(na)) return 1;
                if (isNaN(nb)) return -1;
                return na - nb; // 舊年在上
            });
            var latestYear = arcYears[0] || '';
            if (arcYears.length === 0) {
                document.getElementById('list-archive').innerHTML =
                    '<div class="empty-state"><span class="empty-icon">🗂️</span>無封存項目</div>';
            } else {
                var arcH = '';
                arcYears.forEach(function(yr) {
                    var items = arcMap[yr];
                    var isLatest = (yr === latestYear);
                    var bodyId = 'yr-body-' + yr;
                    var restId = 'yr-rest-' + yr;
                    var moreBtnId = 'yr-more-' + yr;
                    // 所有年份組都只預覽5筆，其餘收起
                    var preview = items.slice(0, 5);
                    var rest = items.slice(5);

                    arcH += '<div class="year-group">';
                    arcH += '<div class="year-header" onclick="toggleYear(\'' + yr + '\')">' +
                        '<span class="year-header-left">' +
                            '<i class="year-arrow' + (isLatest ? ' open' : '') + '" id="yr-arrow-' + yr + '">∨</i>' +
                            ' ' + (yr === '未設定' ? '未設定年份' : yr + ' 年') +
                        '</span>' +
                        '<span class="year-header-right">' + items.length + ' 筆</span>' +
                    '</div>';
                    arcH += '<div id="' + bodyId + '" class="year-body' + (isLatest ? ' open' : '') + '">';
                    arcH += preview.map(buildCard).join('');
                    if (rest.length > 0) {
                        arcH += '<div id="' + restId + '" style="display:none;">' + rest.map(buildCard).join('') + '</div>';
                        arcH += '<div id="' + moreBtnId + '" style="text-align:center;margin:8px 0;">' +
                            '<button onclick="showAllYear(\'' + yr + '\')" ' +
                            'style="background:#1e2530;color:#8eb3cf;border:1px solid #333;padding:8px 20px;border-radius:8px;font-size:13px;">顯示全部（' + items.length + ' 筆）</button>' +
                        '</div>';
                    }
                    arcH += '</div></div>';
                });
                document.getElementById('list-archive').innerHTML = arcH;
            }
            applyCompactMode();
        }

        function showAllYear(yr) {
            var rest = document.getElementById('yr-rest-' + yr);
            var more = document.getElementById('yr-more-' + yr);
            var body = document.getElementById('yr-body-' + yr);
            if (rest) rest.style.display = 'block';
            if (more) more.style.display = 'none';
            if (body) body.style.height = 'auto';
        }

        

        var cX = 0, cY = 0, cMoved = false, cScrolled = false;
        function cs(e) {
            cX = e.touches[0].clientX;
            cY = e.touches[0].clientY;
            cMoved = false;
            cScrolled = false;
            e.stopPropagation();
        }
        function cm(e, id) {
            var m = e.touches[0].clientX - cX;
            var my = e.touches[0].clientY - cY;
            if (Math.abs(my) > Math.abs(m)) {
                // 垂直滑動，標記為捲動，不做側滑
                cScrolled = true;
            } else if (Math.abs(m) > 5) {
                cMoved = true;
                if (m < 0 && m > -160) document.getElementById('card-' + id).style.transform = 'translateX(' + m + 'px)';
            }
            e.stopPropagation();
        }
        function ce(e, id) {
            var m = e.changedTouches[0].clientX - cX;
            var dy = Math.abs(e.changedTouches[0].clientY - cY);
            var c = document.getElementById('card-' + id);
            c.style.transition = 'transform 0.2s';

            if (cMoved && m < -60) {
                c.style.transform = 'translateX(-160px)';
                c.dataset.slid = '1';
            } else if (cMoved) {
                c.style.transform = 'translateX(0px)';
                c.dataset.slid = '0';
            } else if (cScrolled || dy > 10) {
                // 垂直滑動，不做任何事
            } else {
                // 純點擊：若點到 btn-icon（箭頭、編輯、圖釘）讓 onclick 自己處理，不在這裡展開
                var target = e.target.closest('.btn-icon');
                if (target) return;

                if (c.dataset.slid === '1') {
                    c.style.transform = 'translateX(0px)';
                    c.dataset.slid = '0';
                } else {
                    var hasDetail = document.getElementById('box-' + id) !== null;
                    if (hasDetail) toggleBox(id);
                }
            }
            e.stopPropagation();
        }

        function toggleBox(id) {
            var b = document.getElementById('box-' + id);
            if (!b) return;
            var isOpen = b.classList.contains('open');
            b.classList.toggle('open', !isOpen);
            var btn = document.querySelector('.btn-toggle[data-id="' + id + '"]');
            if (btn) btn.classList.toggle('open', !isOpen);
        }

        function toggleYear(yr) {
            var body = document.getElementById('yr-body-' + yr);
            var arrow = document.getElementById('yr-arrow-' + yr);
            var isOpen = body.classList.contains('open');
            body.classList.toggle('open', !isOpen);
            if (arrow) arrow.classList.toggle('open', !isOpen);
            if (isOpen) {
                // 折疊時重置顯示全部按鈕
                var rest = document.getElementById('yr-rest-' + yr);
                var more = document.getElementById('yr-more-' + yr);
                if (rest) rest.style.display = 'none';
                if (more) more.style.display = 'block';
            }
        }

        function addRow(tid, v) {
            var d = v || {n: '', p: '', q: ''};
            var div = document.createElement('div');
            div.style.cssText = 'display:flex;gap:5px;margin-bottom:8px;';
            div.innerHTML =
                '<input type="text" class="d-n" value="' + esc(d.n) + '" placeholder="名稱" style="flex:3;margin:0;">' +
                '<input type="number" class="d-p" value="' + esc(String(d.p)) + '" placeholder="價格" style="flex:2;margin:0;">' +
                '<input type="number" class="d-q" value="' + esc(String(d.q)) + '" placeholder="量" style="width:50px;margin:0;">' +
                '<span onclick="this.parentElement.remove()" style="padding:10px;color:#944;">✕</span>';
            document.getElementById(tid).appendChild(div);
        }

        function openEdit(id) {
            editId = id;
            var it = (id === null)
                ? {name: '', src: '', stat: '未發貨', yy: '', mm: '', dd: '', img: '', link: '', cur: 'TWD', me: [], dai: [], note: ''}
                : db.find(function(x) { return x.id === id; });
            if (!it) return;

            // 新增/編輯 切換按鈕文字和標題
            document.getElementById('save-btn').textContent = (id === null) ? '新增' : '儲存';
            document.getElementById('edit-modal-title').textContent = (id === null) ? '新增事件' : '編輯事件';

            document.getElementById('in-name').value = it.name;
            document.getElementById('in-img').value = it.img;
            document.getElementById('in-link').value = it.link;
            document.getElementById('in-note').value = it.note;
            document.getElementById('in-stat').value = it.stat;
            // 日期轉換：yy/mm/dd → date picker 格式
            var yy = (it.yy || '').replace('年','');
            var mm = (it.mm || '').replace('月','').padStart(2,'0');
            var dd = (it.dd || '').replace('日','').padStart(2,'0');
            document.getElementById('in-date').value = (yy && mm) ? yy + '-' + (mm||'01') + '-' + (dd||'01') : (yy ? yy + '-01-01' : '');
            document.getElementById('in-cur').value = it.cur;
            document.getElementById('in-pin').checked = it.pin || false;

            var s = cfg.srcs.split(',');
            var opt = '';
            s.forEach(function(x) { opt += '<option>' + esc(x.trim()) + '</option>'; });
            document.getElementById('in-src').innerHTML = opt;
            document.getElementById('in-src').value = it.src || s[0].trim();

            document.getElementById('me-rows').innerHTML = '';
            (it.me && it.me.length ? it.me : [{n: '', p: '', q: ''}]).forEach(function(m) { addRow('me-rows', m); });
            document.getElementById('dai-rows').innerHTML = '';
            (it.dai || []).forEach(function(d) { addRow('dai-rows', d); });

            openModal('edit-modal');
        }

        function saveItem() {
            var me = [], dai = [];
            document.querySelectorAll('#me-rows>div').forEach(function(r) {
                var n = r.querySelector('.d-n').value;
                if (n) me.push({n: n, p: parseFloat(r.querySelector('.d-p').value) || 0, q: parseInt(r.querySelector('.d-q').value) || 1});
            });
            document.querySelectorAll('#dai-rows>div').forEach(function(r) {
                var n = r.querySelector('.d-n').value;
                if (n) dai.push({n: n, p: parseFloat(r.querySelector('.d-p').value) || 0, q: parseInt(r.querySelector('.d-q').value) || 1});
            });

            var dateVal = document.getElementById('in-date').value; // "2026-04-23" or ""
            var yySave = '', mmSave = '', ddSave = '';
            if (dateVal) {
                var parts = dateVal.split('-');
                yySave = parts[0] + '年';
                mmSave = parseInt(parts[1]) + '月';
                ddSave = parseInt(parts[2]) + '日';
            }
            var isNew = editId === null;
            var data = {
                name: document.getElementById('in-name').value || '未命名',
                src: document.getElementById('in-src').value,
                stat: document.getElementById('in-stat').value,
                yy: yySave,
                mm: mmSave,
                dd: ddSave,
                img: document.getElementById('in-img').value,
                link: document.getElementById('in-link').value,
                cur: document.getElementById('in-cur').value,
                note: document.getElementById('in-note').value,
                me: me,
                dai: dai,
                pin: document.getElementById('in-pin').checked
            };

            if (!isNew) {
                var idx = db.findIndex(function(x) { return x.id === editId; });
                if (idx > -1) {
                    data.id = editId;
                    data.done = db[idx].done;
                    db[idx] = data;
                }
            } else {
                data.id = String(Date.now());
                data.done = false;
                db.push(data);
            }
            save();
            render();
            closeModal('edit-modal');
            // 2. 儲存後 Toast 提示
            showToast(isNew ? '✓ 已新增「' + data.name + '」' : '✓ 已儲存');
        }

        function setSort(s) {
            cfg.sort = s;
            localStorage.setItem('merch_v28_cfg', JSON.stringify(cfg));
            updateSortUI();
            render();
            closeModal('sort-modal');
        }

        function toggleSortMenu() {
            updateSortUI();
            openModal('sort-modal');
        }

        function updateBackupHint() {
            var hint = document.getElementById('last-backup-hint');
            if (!hint) return;
            var t = localStorage.getItem('merch_last_backup');
            if (!t) { hint.textContent = '尚未備份過'; hint.style.color = '#a06060'; return; }
            var days = Math.floor((Date.now() - Number(t)) / 86400000);
            if (days === 0) { hint.textContent = '今天已備份 ✓'; hint.style.color = '#5a9a6a'; }
            else if (days <= 7) { hint.textContent = days + ' 天前備份'; hint.style.color = '#888'; }
            else { hint.textContent = days + ' 天未備份，建議匯出'; hint.style.color = '#a06060'; }
        }

        function openConfig() {
            document.getElementById('cfg-rate').value = cfg.rate;
            document.getElementById('cfg-srcs').value = cfg.srcs;
            updateBackupHint();
            openModal('cfg-modal');
        }

        function saveConfig() {
            cfg.rate = parseFloat(document.getElementById('cfg-rate').value) || 0.22;
            cfg.srcs = document.getElementById('cfg-srcs').value;
            localStorage.setItem('merch_v28_cfg', JSON.stringify(cfg));
            render();
            closeModal('cfg-modal');
            showToast('✓ 設定已儲存');
        }

        function toggleDone(id) {
            var it = db.find(function(x) { return x.id === id; });
            if (it) {
                it.done = !it.done;
                // 封存時記錄時間，還原時清除
                if (it.done) {
                    it.doneAt = Date.now();
                } else {
                    delete it.doneAt;
                }
                save(); render();
                showToast(it.done ? '📦 已封存「' + it.name + '」' : '↩ 已還原「' + it.name + '」');
            }
        }

        var pendingDelId = null;
        function delItem(id) {
            var it = db.find(function(x) { return x.id === id; });
            pendingDelId = id;
            document.getElementById('del-name').textContent = '「' + (it ? it.name : '') + '」';
            document.getElementById('del-confirm-btn').onclick = function() {
                var name = it ? it.name : '';
                closeModal('del-modal');
                setTimeout(function() {
                    db = db.filter(function(x) { return x.id !== pendingDelId; });
                    save(); render();
                    showToast('🗑 已刪除「' + name + '」');
                }, 200);
            };
            openModal('del-modal');
        }

        function openModal(id) {
            var el = document.getElementById(id);
            el.style.display = 'flex';
            requestAnimationFrame(function() {
                el.classList.add('show');
                // scroll modal 內容到頂部
                var modal = el.querySelector('.modal');
                if (modal) modal.scrollTop = 0;
            });
        }

        function closeModal(id) {
            var el = document.getElementById(id);
            el.classList.remove('show');
            // 重置 touch 狀態，防止彈窗關閉後誤觸發卡片展開
            cMoved = false; cScrolled = true;
            setTimeout(function() {
                el.style.display = 'none';
                cScrolled = false;
            }, 350);
        }

        function overlayClick(e, id) {
            if (e.target === e.currentTarget) closeModal(id);
        }

        // 緊湊模式
        var isCompact = localStorage.getItem('merch_compact') === '1';
        function toggleCompact() {
            isCompact = !isCompact;
            localStorage.setItem('merch_compact', isCompact ? '1' : '0');
            applyCompactMode();
        }
        function applyCompactMode() {
            var wrapper = document.getElementById('page-wrapper');
            wrapper.className = isCompact ? 'mode-compact' : 'mode-normal';
            var btn = document.getElementById('compact-btn');
            if (btn) {
                btn.classList.toggle('active', isCompact);
                btn.textContent = isCompact ? '舒適' : '緊湊';
            }
        }

        function toggleCompactBox(id) {
            var box = document.getElementById('cc-box-' + id);
            if (!box) return;
            var arrow = document.getElementById('cc-arrow-' + id);
            var isOpen = box.classList.contains('open');
            box.classList.toggle('open', !isOpen);
            if (arrow) arrow.classList.toggle('open', !isOpen);
        }
        function toggleSearch() {
            searchOpen = !searchOpen;
            document.getElementById('search-container').classList.toggle('open', searchOpen);
            if (searchOpen) {
                setTimeout(function() { document.getElementById('search-input').focus(); }, 300);
            } else {
                document.getElementById('search-input').value = '';
                filterSearch('');
            }
        }
        function filterSearch(q) {
            var kw = q.trim().toLowerCase();
            // 進行中
            document.querySelectorAll('#list-active .swipe-container').forEach(function(el) {
                var hide = kw && !(el.dataset.search || '').toLowerCase().includes(kw);
                el.style.display = hide ? 'none' : '';
                var next = el.nextElementSibling;
                if (next && next.classList.contains('detail-box')) next.style.display = hide ? 'none' : '';
                var gap = next && next.classList.contains('detail-box') ? next.nextElementSibling : next;
                if (gap && gap.classList.contains('no-detail-gap')) gap.style.display = hide ? 'none' : '';
            });
            // 封存區
            document.querySelectorAll('#list-archive .swipe-container').forEach(function(el) {
                var hide = kw && !(el.dataset.search || '').toLowerCase().includes(kw);
                el.style.display = hide ? 'none' : '';
                var next = el.nextElementSibling;
                if (next && next.classList.contains('detail-box')) next.style.display = hide ? 'none' : '';
                var gap = next && next.classList.contains('detail-box') ? next.nextElementSibling : next;
                if (gap && gap.classList.contains('no-detail-gap')) gap.style.display = hide ? 'none' : '';
            });
        }

        function exportData() {
            var json = JSON.stringify(db, null, 2);
            var blob = new Blob([json], {type: 'application/json'});
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            var date = new Date().toISOString().slice(0,10);
            a.href = url;
            a.download = 'merch-backup-' + date + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            localStorage.setItem('merch_last_backup', Date.now());
            showToast('✓ 備份檔案已下載');
            updateBackupHint();
        }

        function importData() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        var parsed = JSON.parse(ev.target.result);
                        parsed.forEach(function(it) {
                            if (!it.id) it.id = String(Date.now() + Math.random());
                        });
                        db = parsed;
                        save(); render();
                        showToast('✓ 匯入成功，共 ' + db.length + ' 筆');
                    } catch(e) {
                        alert('格式錯誤，請確認備份檔案是否完整！');
                    }
                };
                reader.readAsText(file);
            };
            document.body.appendChild(input);
            input.click();
            document.body.removeChild(input);
        }

        (function migrateOldData() {
            var changed = false;
            var statMap = {'未發貨': '待出貨', '已發貨': '運送中', '集運中': '運送中', '已到貨': '已到貨'};
            db.forEach(function(it) {
                if (!it.id) { it.id = String(Date.now() + Math.random()); changed = true; }
                // 6. 舊狀態自動轉換
                if (it.stat && statMap[it.stat] && it.stat !== statMap[it.stat]) {
                    it.stat = statMap[it.stat]; changed = true;
                }
            });
            if (changed) save();
        })();
        // Service Worker 註冊
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
