<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>みるく的推活周邊管理</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#141820">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="推活周邊">
    <link rel="apple-touch-icon" href="/icon_512.png">
    <style>
        :root { 
            --main-blue: #5c7a91;
            --bg-active: #141820; --bg-archive: #0b0f14; --bg-drawer: #0f1318;
            --card-bg: #252c36; --modal-bg: #1e242e; --input-bg: #141820;
            --accent-blue: #4a6982; --accent-green: #3d6350;
            --price-green: #a6e3a1;
            --text-bright: #bbb; --text-muted: #666; --text-dim: #555; --text-faint: #444;
            --stat-pending: #6b7280; --stat-shipping: #4a7c6b; --stat-arrived: #4a6982;
            --action-archive: #2e5470; --action-delete: #2e5c47;
            --border-strong: #2a2f38; --border-mid: #2a3040; --border-soft: #1e2530; --border-input: #333;
            --radius-card: 12px; --radius-sm: 8px;
            --seg-active-bg: #2e3d50; --seg-active-color: #8eb3cf;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-active); color: #eee; font-family: sans-serif; margin: 0; padding: 10px; padding-top: 0; padding-bottom: 90px; min-height: 100vh; transition: background 0.3s ease; overscroll-behavior-y: contain; overscroll-behavior-x: none; }
        #app-root { overflow-x: hidden; overscroll-behavior-x: none; }

        /* Toast 提示 */
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: #3d6350; color: #fff; padding: 10px 22px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 9999; pointer-events: none; white-space: nowrap; max-width: 90vw; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

        /* 日幣標籤 */
        .jpy-tag { font-size: 11px; color: #8eb3cf; font-weight: normal; margin-left: 4px; }

        /* 空狀態 */
        .empty-state { text-align: center; color: #444; margin-top: 60px; line-height: 2; }
        .empty-state .empty-icon { font-size: 36px; display: block; margin-bottom: 8px; }
        .empty-state .empty-hint { font-size: 13px; color: #3d6350; }
        
        /* 導覽列 */
        .tab-nav-wrapper { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--bg-active); padding: 0 10px; transition: background 0.3s ease; }
        .tab-nav-wrapper.bg-archive { background: var(--bg-archive); }
        .tab-nav-inner { display: flex; align-items: center; border-bottom: 1px solid var(--border-strong); position: relative; height: 50px; }
        .hamburger-btn { background: none; border: none; color: #888; padding: 4px 10px 4px 0; cursor: pointer; display: flex; align-items: center; flex-shrink: 0; }
        .tabs-group { display: flex; position: relative; flex: 1; align-self: stretch; align-items: flex-end; }
        .tab { background: transparent; color: var(--text-muted); border: none; padding: 8px 10px 10px; font-weight: bold; font-size: 14px; position: relative; transition: color 0.2s; cursor: pointer; white-space: nowrap; }
        .tab.active { color: #fff; }
        #tab-indicator { position: absolute; bottom: 0; height: 2px; background: var(--main-blue); border-radius: 2px; transition: left 0.25s ease-out, width 0.25s ease-out; }
        .seg-ctrl { display: flex; background: var(--border-soft); border-radius: var(--radius-sm); padding: 3px; gap: 2px; margin: 0 6px; flex-shrink: 0; }
        .seg-btn { background: transparent; border: none; color: var(--text-dim); padding: 4px 9px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
        .seg-btn.active { background: var(--seg-active-bg); color: var(--seg-active-color); }
        .search-icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; display: flex; align-items: center; flex-shrink: 0; }

        /* 搜尋欄 */
        #search-container { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, opacity 0.25s ease; opacity: 0; padding: 0 2px; }
        #search-container.open { max-height: 52px; opacity: 1; }
        #search-input { width: 100%; padding: 8px 12px; background: var(--border-soft); border: 1px solid var(--border-input); color: #fff; border-radius: var(--radius-sm); font-size: 14px; margin: 6px 0 4px 0; box-sizing: border-box; }

        /* ── 側邊抽屜 ── */
        #drawer-overlay { position: fixed; inset: 0; z-index: 150; background: rgba(0,0,0,0); pointer-events: none; transition: background 0.28s ease; }
        #drawer-overlay.open { pointer-events: auto; }
        #drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; z-index: 151; background: var(--bg-drawer); transform: translateX(-100%); display: flex; flex-direction: column; border-right: 1px solid var(--border-strong); will-change: transform; overflow-y: auto; }
        #drawer.open { transform: translateX(0); }
        .drawer-header { padding: 52px 20px 16px; border-bottom: 1px solid var(--border-strong); }
        .drawer-title { font-size: 17px; font-weight: bold; color: #fff; }
        .drawer-subtitle { font-size: 12px; color: #99a; margin-top: 3px; }
        .drawer-section { padding: 8px 0; border-bottom: 1px solid var(--border-soft); }
        .drawer-section-label { font-size: 11px; color: #888; font-weight: bold; padding: 6px 20px 2px; letter-spacing: 0.05em; text-transform: uppercase; }
        .drawer-item { display: flex; align-items: center; gap: 14px; padding: 13px 20px; cursor: pointer; transition: background 0.15s; color: #ddd; font-size: 14px; }
        .drawer-item:active { background: var(--border-soft); }
        .drawer-item svg { flex-shrink: 0; }
        .drawer-item-label { flex: 1; }
        .drawer-item-value { font-size: 12px; color: #99a; }
        /* 排序：四選項，選中直接亮起 */
        .drawer-sort-group { padding: 4px 12px 8px; display: flex; flex-direction: column; gap: 2px; }
        .sort-opt { padding: 9px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; color: #aaa; transition: all 0.15s; }
        .sort-opt:active { background: var(--border-soft); }
        .sort-opt.active { background: var(--seg-active-bg); color: var(--seg-active-color); }
        .drawer-footer { margin-top: auto; padding: 16px 20px; }
        .drawer-version { font-size: 11px; color: #666; text-align: center; }
        .edge-hint { position: fixed; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 60px; border-radius: 0 3px 3px 0; background: rgba(92,122,145,0.4); pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.3s; }
        .edge-hint.show { opacity: 1; }
        #page-wrapper { display: flex; width: 200%; transition: transform 0.3s ease-out; margin-top: 8px; }
        .page-content { width: 50%; padding: 0 4px; flex-shrink: 0; }

        /* 卡片與側滑 */
        .card-wrap { margin-bottom: 0; }
        .swipe-container { position: relative; margin-bottom: 0; }
        .swipe-area { position: relative; border-radius: var(--radius-card); overflow: hidden; background: #000; width: 100%; }
        .swipe-container.pinned-container > .swipe-area { border-left: 3px solid var(--main-blue); }
        .swipe-btns { position: absolute; right: 0; top: 0; bottom: 0; width: 160px; display: flex; z-index: 1; }
        .action-btn { width: 80px !important; min-width: 80px !important; max-width: 80px !important; flex: 0 0 80px !important; border: none; color: white; font-weight: bold; font-size: 14px; padding: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; white-space: nowrap; }
        .action-done { background: var(--action-archive); }
        .action-del { background: var(--action-delete); }
        .no-detail-gap { margin-bottom: 4px; }
        .detail-box { background: #131720; border-radius: 0 0 var(--radius-card) var(--radius-card); max-height: 0; overflow: hidden; transition: max-height 0.35s ease-out; margin-bottom: 4px; }
        .detail-box.open { max-height: 800px; }
        .detail-inner { padding: 15px; border-top: 1px solid var(--border-mid); transform: translateY(-8px); opacity: 0; transition: transform 0.3s ease-out, opacity 0.3s ease; }
        .detail-box.open .detail-inner { transform: translateY(0); opacity: 1; }
        .card { background: var(--card-bg); padding: 14px; position: relative; z-index: 2; transition: transform 0.2s ease; display: flex; gap: 12px; min-height: 80px; }
        .card.pinned { background: var(--card-bg); }
        .img-box { width: 65px; height: 65px; background: #1e2329; border-radius: 10px; flex-shrink: 0; border: 1px solid var(--border-input); display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--text-muted); font-size: 12px; cursor: pointer; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { flex: 1; min-width: 0; }
        .title-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; }
        .title { font-size: 18px; font-weight: bold; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 75%; }
        .src-text { font-size: 11px; color: #aaa; border-left: 1px solid #555; padding-left: 6px; }
        .date-text { font-size: 12px; color: #aaa; margin: 2px 0; }
        .price-text { color: var(--price-green); font-size: 16px; font-weight: bold; margin-top: 4px; }

        /* 狀態標籤：半透明填充 + 對應亮色文字 */
        .stat-tag { position: absolute; top: 10px; right: 12px; font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; letter-spacing: 0.3px; }
        .stat-pending { color: #b0b8c4; background: rgba(107,114,128,0.25); }
        .stat-shipping { color: #7dd4bc; background: rgba(74,124,107,0.3); }
        .stat-arrived { color: #7db3cf; background: rgba(74,105,130,0.3); }

        .ctrl-group { position: absolute; bottom: 6px; right: 4px; display: flex; gap: 2px; }
        .btn-icon { background: none; border: none; color: #666; font-size: 20px; padding: 8px; transition: transform 0.25s ease; min-width: 36px; min-height: 36px; display: flex; align-items: center; justify-content: center; }
        .btn-icon.open { transform: rotate(180deg); }

        /* 明細層次樣式 — C 版本 */
        .detail-section-title { font-size: 11px; font-weight: bold; color: #aaa; letter-spacing: 0.08em; text-transform: uppercase; margin: 8px 0 5px; }
        .detail-section-title.dai-title { color: #7ab0cc; margin-top: 12px; }
        .detail-row { display: flex; justify-content: space-between; font-size: 13px; color: #fff; padding: 3px 0; }
        .detail-price { color: #bbb; }
        .detail-jpy { font-size: 11px; color: #999; margin-left: 4px; }
        .dai-person-block { border-left: 2px solid #4a7a90; padding-left: 10px; margin-bottom: 8px; }
        .dai-person-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .dai-person-name { font-size: 12px; color: #8ab8cc; font-weight: normal; }
        .dai-subtotal { font-size: 11px; color: #6a9aaa; }
        .dai-item-row { display: flex; justify-content: space-between; font-size: 12px; color: #7aaabb; padding: 2px 0 2px 4px; }
        .dai-item-price { color: #6a9aaa; }
        .dai-item-jpy { font-size: 10px; color: #5a8090; margin-left: 3px; }
        .note-area { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #333; font-size: 13px; color: #aaa; }

        /* 彈窗動畫：從底部滑上 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0); display: none; z-index: 2000; overflow-y: auto; transition: background 0.25s ease; align-items: flex-start; }
        .overlay.show { background: rgba(0,0,0,0.85); }
        #del-modal { align-items: center; justify-content: center; }
        #del-modal .modal { transform: scale(0.92); opacity: 0; transition: transform 0.22s ease-out, opacity 0.2s ease; margin: 0; border-radius: var(--radius-card); }
        #del-modal.show .modal { transform: scale(1); opacity: 1; }
        #edit-modal { align-items: flex-end; justify-content: center; }
        #edit-modal .modal { width: 100%; border-radius: var(--radius-card) var(--radius-card) 0 0; transform: translateY(100%); opacity: 1; transition: transform 0.3s ease-out; max-height: 92vh; overflow-y: auto; margin: 0; }
        #edit-modal.show .modal { transform: translateY(0); }
        #cfg-modal { align-items: flex-end; justify-content: center; }
        #cfg-modal .modal { width: 100%; border-radius: var(--radius-card) var(--radius-card) 0 0; transform: translateY(100%); opacity: 1; transition: transform 0.3s ease-out; max-height: 92vh; overflow-y: auto; margin: 0; }
        #cfg-modal.show .modal { transform: translateY(0); }
        #srcs-modal { align-items: flex-end; justify-content: center; }
        #srcs-modal .modal { width: 100%; border-radius: var(--radius-card) var(--radius-card) 0 0; transform: translateY(100%); opacity: 1; transition: transform 0.3s ease-out; max-height: 92vh; overflow-y: auto; margin: 0; }
        #srcs-modal.show .modal { transform: translateY(0); }
        .modal { background: var(--modal-bg); width: 100%; padding: 18px; border-radius: 0; }
        .modal h3 { margin: 0 0 15px 0; font-size: 18px; }

        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; background: var(--input-bg); border: 1px solid var(--border-input); color: #fff; border-radius: 6px; font-size: 14px; }
        .row-group { display: flex; gap: 8px; }
        .add-btn-container { display: flex; justify-content: flex-end; margin: 5px 0 15px 0; }
        .add-link { background: #3a4752; color: #adc5d9; font-size: 12px; text-decoration: none; padding: 4px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .cfg-btn-export { flex: 1; background: #3a4752; color: #adc5d9; padding: 10px; border: none; border-radius: 6px; font-weight: bold; }
        .cfg-btn-import { flex: 1; background: #324a41; color: #a1c7b9; padding: 10px; border: none; border-radius: 6px; font-weight: bold; }

        /* 封存區年份分組 */
        .year-group { margin-bottom: 4px; }
        .year-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--bg-archive); border: 1px solid var(--border-mid); border-radius: var(--radius-card); margin-bottom: 4px; cursor: pointer; user-select: none; transition: background 0.2s; }
        .year-header:active { background: #141b24; }
        .year-header-left { font-size: 14px; font-weight: bold; color: var(--seg-active-color); display: flex; align-items: center; gap: 6px; }
        .year-arrow { display: inline-block; transition: transform 0.25s ease; font-style: normal; }
        .year-arrow.open { transform: rotate(180deg); }
        .year-header-right { font-size: 12px; color: var(--text-dim); }
        .year-body { display: none; overflow: visible; }
        .year-body.open { display: block; height: auto !important; }

        /* 代購對象分組 */
        .dai-person { background: var(--input-bg); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); margin-bottom: 10px; overflow: hidden; }
        .dai-person-header { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-bottom: 1px solid var(--border-strong); }
        .dai-person-input { flex: 1; background: transparent; border: none; color: #eee; font-size: 14px; font-weight: bold; padding: 2px 0; outline: none; }
        .dai-person-input::placeholder { color: #555; font-weight: normal; }
        .dai-person-del { background: none; border: none; color: #944; font-size: 16px; padding: 2px 6px; cursor: pointer; }
        .dai-person-items { padding: 8px 10px; }
        .dai-add-item { font-size: 12px; color: var(--main-blue); background: none; border: none; cursor: pointer; padding: 4px 0; margin-top: 2px; }

        .field-label { font-size: 11px; color: #888; margin: 10px 0 3px 2px; letter-spacing: 0.5px; }
        .section-label { font-size: 13px; font-weight: bold; color: var(--main-blue); margin-bottom: 8px; }
        .fab { position: fixed; bottom: 25px; right: 25px; width: 56px; height: 56px; background: var(--accent-green); color: white; border-radius: 50%; border: none; font-size: 28px; z-index: 999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .fab:active { transform: scale(0.93); box-shadow: 0 2px 6px rgba(0,0,0,0.3); }

        /* 置頂分隔線 */
        .pin-divider { height: 1px; background: rgba(255,255,255,0.12); margin: 8px 0; }

        /* 緊湊模式卡片 */
        .card-compact { background: var(--card-bg); border-radius: 0; display: flex; align-items: center; padding: 8px 4px 8px 10px; position: relative; z-index: 2; transition: transform 0.2s ease; }
        .cc-bar { width: 4px; height: 36px; border-radius: 4px; flex-shrink: 0; margin-right: 10px; }
        .cc-bar-pending  { background: var(--stat-pending); }
        .cc-bar-shipping { background: var(--stat-shipping); }
        .cc-bar-arrived  { background: var(--stat-arrived); }
        .cc-body { flex: 1; min-width: 0; margin-right: 8px; }
        .cc-name { font-size: 15px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cc-sub  { font-size: 11px; color: var(--text-muted); margin-top: 3px; white-space: nowrap; }
        .cc-sep  { color: var(--border-input); margin: 0 5px; }
        .cc-price { width: 80px; text-align: right; font-size: 14px; font-weight: bold; color: var(--price-green); white-space: nowrap; flex-shrink: 0; }
        .cc-btns { width: 56px; display: flex; align-items: center; justify-content: flex-end; flex-shrink: 0; }
        .cc-btn  { background: none; border: none; color: var(--text-muted); font-size: 16px; padding: 4px 5px; cursor: pointer; transition: transform 0.2s; }
        .cc-btn.open { transform: rotate(180deg); }
        .cc-placeholder { width: 26px; flex-shrink: 0; }

        /* 列表細項展開 */
        .detail-compact { background: #131720; border-radius: 0 0 var(--radius-card) var(--radius-card); max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; margin-bottom: 5px; }
        .detail-compact.open { max-height: 500px; }
        .detail-compact .detail-inner { padding: 12px; border-top: 1px solid var(--border-mid); opacity: 1; transform: none; }

        /* 列表模式側滑結構 */
        .cc-swipe-container { position: relative; margin-bottom: 0; }
        .cc-swipe-area { position: relative; border-radius: var(--radius-card); overflow: hidden; background: #000; width: 100%; margin-bottom: 4px; }

        /* 模式顯示控制 */
        .mode-compact .swipe-container { display: none; }
        .mode-compact .detail-box { display: none; }
        .mode-normal .card-compact { display: none; }
        .mode-normal .detail-compact { display: none; }
    </style>
</head>
<body onload="init()">
    <div id="app-root">
    <div class="tab-nav-wrapper" id="tab-nav-wrapper">
        <div class="tab-nav-inner">
            <button class="hamburger-btn" onclick="openDrawer()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div class="tabs-group">
                <button id="t-act" class="tab active" onclick="jumpTab('active')">進行中</button>
                <button id="t-arc" class="tab" onclick="jumpTab('archive')">已封存</button>
                <div id="tab-indicator"></div>
            </div>
            <div class="seg-ctrl">
                <button class="seg-btn active" id="seg-card" onclick="setMode('card')">卡片</button>
                <button class="seg-btn" id="seg-list" onclick="setMode('list')">列表</button>
            </div>
            <button class="search-icon-btn" onclick="toggleSearch()">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            </button>
        </div>
        <div id="search-container">
            <input type="text" id="search-input" placeholder="搜尋" oninput="filterSearch(this.value)">
        </div>
    </div>
    <div id="nav-spacer" style="height:0px;"></div>

    <div id="page-wrapper" class="mode-normal">
        <div id="list-active" class="page-content"></div>
        <div id="list-archive" class="page-content"></div>
    </div>

    <button class="fab" onclick="openEdit(null)">+</button>
    <div id="toast"></div>
    <div class="edge-hint" id="edge-hint"></div>

    <!-- 側邊抽屜遮罩 -->
    <div id="drawer-overlay" onclick="closeDrawer()"></div>

    <!-- 側邊抽屜 -->
    <div id="drawer">

            <div style="display:flex; gap:10px;">
                <button onclick="closeModal('edit-modal')" style="flex:1; padding:12px; background:#444; color:white; border:none; border-radius:8px;">取消</button>
                <button id="save-btn" onclick="saveItem()" style="flex:1; padding:12px; background:var(--main-blue); color:white; border:none; border-radius:8px;">儲存</button>
            </div>
        </div>
    </div>

    <!-- 刪除確認彈窗 -->
    <div id="del-modal" class="overlay" onclick="overlayClick(event,'del-modal')">
        <div class="modal" onclick="event.stopPropagation()" style="text-align:center;">
            <div style="font-size:28px;margin-bottom:10px;">🗑</div>
            <h3 style="margin:0 0 8px 0;">確認刪除</h3>
            <p id="del-name" style="color:#bbb;font-size:14px;margin:0 0 20px 0;"></p>
            <p style="color:#888;font-size:12px;margin:0 0 20px 0;">刪除後無法復原</p>
            <div style="display:flex;gap:10px;">
                <button onclick="closeModal('del-modal')" style="flex:1;padding:12px;background:#333;color:white;border:none;border-radius:8px;">取消</button>
                <button id="del-confirm-btn" style="flex:1;padding:12px;background:#7a3030;color:white;border:none;border-radius:8px;">確認刪除</button>
            </div>
        </div>
    </div>

    <!-- 匯率設定彈窗 -->
    <div id="cfg-modal" class="overlay" onclick="overlayClick(event,'cfg-modal')">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>匯率設定</h3>
            <div class="field-label">1 JPY =</div>
            <div style="display:flex; align-items:center; gap:8px;">
                <input type="number" id="cfg-rate" step="0.001" style="flex:1; margin:0;">
                <span style="color:#888; white-space:nowrap; font-size:14px;">TWD</span>
            </div>
            <button onclick="saveConfig()" style="width:100%; padding:15px; background:var(--main-blue); color:white; border:none; border-radius:8px; margin-top:14px;">儲存並關閉</button>
        </div>
    </div>

    <!-- 來源清單彈窗 -->
    <div id="srcs-modal" class="overlay" onclick="overlayClick(event,'srcs-modal')">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>來源清單</h3>
            <div class="field-label">每行一個來源</div>
            <textarea id="cfg-srcs" style="height:160px;" placeholder="幽浮官網&#10;Aniplex&#10;噗浪&#10;社團&#10;代購"></textarea>
            <button onclick="saveSrcs()" style="width:100%; padding:15px; background:var(--main-blue); color:white; border:none; border-radius:8px; margin-top:14px;">儲存並關閉</button>
        </div>
    </div>

    <script>
        var db, cfg;
        try {
            db = JSON.parse(localStorage.getItem('merch_v28_db') || '[]');
            cfg = JSON.parse(localStorage.getItem('merch_v28_cfg') || '{"rate":0.22,"srcs":"幽浮官網, Aniplex, 噗浪, 社團, 代購","sort":"pre-old"}');
        } catch(e) {
            db = [];
            cfg = {rate: 0.22, srcs: '幽浮官網, Aniplex, 噗浪, 社團, 代購', sort: 'pre-old'};
        }
        var curTab = 'active';
        var searchOpen = false;
        var editId = null;

        function esc(s) {
            return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        function save() {
            try {
                localStorage.setItem('merch_v28_db', JSON.stringify(db));
            } catch(e) {
                showToast('⚠ 儲存失敗，請匯出備份');
            }
        }

        // Toast 提示
        var toastTimer = null;
        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2000);
        }

        function updateSortUI() {
            ['new','old','pre-new','pre-old'].forEach(function(k) {
                var el = document.getElementById('sort-opt-' + k);
                if (el) el.classList.toggle('active', cfg.sort === k);
            });
        }

        function init() {
            updateSortUI();
            setupSwipe();
            setupDrawerSwipe();
            render();
            applyCompactMode();
            updateDrawerInfo();
            setTimeout(function() {
                var nav = document.querySelector('.tab-nav-wrapper');
                var spacer = document.getElementById('nav-spacer');
                if (nav && spacer) spacer.style.height = nav.offsetHeight + 'px';
                var activeBtn = document.getElementById('t-act');
                var indicator = document.getElementById('tab-indicator');
                if (indicator && activeBtn) {
                    indicator.style.left = activeBtn.offsetLeft + 'px';
                    indicator.style.width = activeBtn.offsetWidth + 'px';
                }
            }, 50);
        }

        function updateDrawerInfo() {
            var active = db.filter(function(x) { return !x.done; }).length;
            var archived = db.filter(function(x) { return x.done; }).length;
            var sub = document.getElementById('drawer-subtitle');
            if (sub) sub.textContent = active + ' 件進行中・' + archived + ' 件已封存';
            var rateHint = document.getElementById('drawer-rate-hint');
            if (rateHint) rateHint.textContent = '1 JPY = ' + cfg.rate + ' TWD';
        }

        var justCollapsed = false;

        // ── 側邊抽屜 ──
        var drawerOpen = false;
        var drawerCloseTimer = null;

        // 攔截 Chrome 返回手勢：開抽屜時推假歷史，返回時關抽屜
        window.addEventListener('popstate', function(e) {
            if (drawerOpen) {
                closeDrawer();
            }
        });

        function openDrawer() {
            if (drawerCloseTimer) { clearTimeout(drawerCloseTimer); drawerCloseTimer = null; }
            drawerOpen = true;
            updateDrawerInfo();
            var el = document.getElementById('drawer');
            var ov = document.getElementById('drawer-overlay');
            el.style.transition = 'transform 0.28s cubic-bezier(0.4,0,0.2,1)';
            el.style.transform = 'translateX(0)';
            el.classList.add('open');
            ov.style.background = 'rgba(0,0,0,0.55)';
            ov.style.pointerEvents = 'auto';
            ov.classList.add('open');
            document.body.style.overflow = 'hidden';
            // 推假歷史讓系統返回手勢關抽屜而非關頁面
            history.pushState({ drawer: true }, '');
        }
        function closeDrawer() {
            drawerOpen = false;
            var el = document.getElementById('drawer');
            var ov = document.getElementById('drawer-overlay');
            el.style.transition = 'transform 0.28s cubic-bezier(0.4,0,0.2,1)';
            el.style.transform = 'translateX(-100%)';
            ov.style.background = '';
            ov.style.pointerEvents = 'none';
            ov.classList.remove('open');
            drawerCloseTimer = setTimeout(function() {
                el.classList.remove('open');
                el.style.transform = '';
                drawerCloseTimer = null;
            }, 300);
            document.body.style.overflow = '';
            // 若還在假歷史上就返回，避免堆積
            if (history.state && history.state.drawer) {
                history.back();
            }
        }

        function setupDrawerSwipe() {
            var edgeHint = document.getElementById('edge-hint');
            var dragStartX = 0, dragStartY = 0;
            var isDragging = false, isEdgeDrag = false;
            var EDGE_ZONE = 16;
            var drawerEl = document.getElementById('drawer');
            var overlayEl = document.getElementById('drawer-overlay');

            document.addEventListener('touchstart', function(e) {
                var t = e.touches[0];
                dragStartX = t.clientX;
                dragStartY = t.clientY;
                isDragging = false;
                isEdgeDrag = !drawerOpen && dragStartX < EDGE_ZONE;
                if (isEdgeDrag) edgeHint.classList.add('show');
            }, { passive: true });

            document.addEventListener('touchmove', function(e) {
                if (!isEdgeDrag) return;
                var t = e.touches[0];
                var dx = t.clientX - dragStartX;
                var dy = Math.abs(t.clientY - dragStartY);
                if (dx > 5 && dy < dx * 0.8) {
                    e.preventDefault(); // 阻止 Chrome 返回手勢
                    isDragging = true;
                    var x = Math.min(dx, 280);
                    drawerEl.style.transition = 'none';
                    drawerEl.style.transform = 'translateX(' + (x - 280) + 'px)';
                    drawerEl.classList.add('open');
                    var progress = x / 280;
                    overlayEl.style.background = 'rgba(0,0,0,' + (0.55 * progress) + ')';
                    overlayEl.style.pointerEvents = progress > 0.05 ? 'auto' : 'none';
                }
            }, { passive: false });

            document.addEventListener('touchend', function(e) {
                edgeHint.classList.remove('show');
                if (!isEdgeDrag) { isDragging = false; isEdgeDrag = false; return; }
                var dx = e.changedTouches[0].clientX - dragStartX;
                overlayEl.style.background = '';
                if (isDragging && dx > 80) {
                    openDrawer();
                } else if (isDragging) {
                    closeDrawer();
                }
                isDragging = false;
                isEdgeDrag = false;
            }, { passive: true });

            // 抽屜內左滑關閉
            drawerEl.addEventListener('touchstart', function(e) {
                dragStartX = e.touches[0].clientX;
            }, { passive: true });
            drawerEl.addEventListener('touchend', function(e) {
                var dx = e.changedTouches[0].clientX - dragStartX;
                if (dx < -50) closeDrawer();
            }, { passive: true });
        }

        var startX = 0, startY = 0;
        function setupSwipe() {
            document.addEventListener('touchstart', function(e) {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, {passive: true});

            document.addEventListener('touchend', function(e) {
                // 邊緣手勢留給 drawer，不觸發 tab 切換
                if (startX < 20) return;
                var dx = e.changedTouches[0].clientX - startX;
                var dy = e.changedTouches[0].clientY - startY;
                if (Math.abs(dx) > 120 && Math.abs(dy) < 50) {
                    if (dx > 0 && curTab === 'archive') jumpTab('active');
                    else if (dx < 0 && curTab === 'active') jumpTab('archive');
                }
            }, {passive: true});

            // 點空白處收回所有側滑卡片
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.swipe-container') && !e.target.closest('.cc-swipe-container')) {
                    document.querySelectorAll('.card, .card-compact').forEach(function(c) {
                        c.style.transition = 'transform 0.2s';
                        c.style.transform = 'translateX(0px)';
                        c.dataset.slid = '0';
                    });
                }
            });
        }

        function jumpTab(t) {
            curTab = t;
            document.getElementById('page-wrapper').style.transform = (t === 'active' ? 'translateX(0)' : 'translateX(-50%)');
            document.body.style.background = (t === 'active' ? 'var(--bg-active)' : 'var(--bg-archive)');
            var nav = document.querySelector('.tab-nav-wrapper');
            if (nav) nav.classList.toggle('bg-archive', t === 'archive');
            document.getElementById('t-act').className = (t === 'active' ? 'tab active' : 'tab');
            document.getElementById('t-arc').className = (t === 'archive' ? 'tab active' : 'tab');
            var activeBtn = document.getElementById(t === 'active' ? 't-act' : 't-arc');
            var indicator = document.getElementById('tab-indicator');
            if (indicator && activeBtn) {
                indicator.style.left = activeBtn.offsetLeft + 'px';
                indicator.style.width = activeBtn.offsetWidth + 'px';
            }
        }

        function render() {
            var sorted = [...db];

            // 先一般排序（只針對進行中非置頂卡片）
            var pinned = sorted.filter(function(x) { return !x.done && x.pin; });
            var unpinned = sorted.filter(function(x) { return !x.done && !x.pin; });
            var archived = sorted.filter(function(x) { return x.done; });

            if (cfg.sort === 'new') {
                unpinned.reverse();
            } else if (cfg.sort === 'old') {
                // 保持原始順序
            } else if (cfg.sort === 'pre-new' || cfg.sort === 'pre-old') {
                var sortByDate = function(arr) {
                    arr.sort(function(a, b) {
                        var da = parseInt(
                            (a.yy || '0000').replace('年', '') +
                            (a.mm || '00').replace('月', '').padStart(2, '0') +
                            (a.dd || '00').replace('日', '').padStart(2, '0')
                        );
                        var dbv = parseInt(
                            (b.yy || '0000').replace('年', '') +
                            (b.mm || '00').replace('月', '').padStart(2, '0') +
                            (b.dd || '00').replace('日', '').padStart(2, '0')
                        );
                        return cfg.sort === 'pre-new' ? dbv - da : da - dbv;
                    });
                };
                sortByDate(pinned);
                sortByDate(unpinned);
            }

            var actList = pinned.concat(unpinned);

            var arcMap = {};
            // 封存區依封存時間排序（最新封存在上）
            archived.sort(function(a, b) { return (b.doneAt || 0) - (a.doneAt || 0); });
            archived.forEach(function(it) {
                // 用預購年份分組（沒填就歸「未設定」）
                var yr = (it.yy || '').replace('年','') || '未設定';
                if (!arcMap[yr]) arcMap[yr] = [];
                arcMap[yr].push(it);
            });

            // 3. 進行中 Tab（不顯示數量）
            document.getElementById('t-act').textContent = '進行中';

            function buildCard(it) {
                var totalVal = 0, detailH = '';
                var hasDetail = ((it.me && it.me.length > 0) || (it.dai && it.dai.length > 0) || it.note);

                // 個人區塊
                if (it.me && it.me.length > 0) {
                    detailH += '<div class="detail-section-title">個人</div>';
                    it.me.forEach(function(m) {
                        totalVal += (m.p * m.q);
                        var priceStr = it.cur === 'JPY'
                            ? 'NT ' + Math.round(m.p * m.q * cfg.rate).toLocaleString() + '<span class="detail-jpy">（JPY ' + (m.p * m.q).toLocaleString() + '）</span>'
                            : (m.p * m.q).toLocaleString();
                        detailH += '<div class="detail-row"><span>' + esc(m.n) + ' (x' + esc(String(m.q)) + ')</span><span class="detail-price">' + priceStr + '</span></div>';
                    });
                }

                // 代購區塊
                if (it.dai && it.dai.length > 0) {
                    var daiData = it.dai;
                    if (daiData.length && daiData[0].person === undefined) {
                        daiData = [{person: '', items: daiData}];
                    }
                    detailH += '<div class="detail-section-title dai-title">代購</div>';
                    daiData.forEach(function(d) {
                        var personTotal = 0;
                        (d.items || []).forEach(function(item) { personTotal += (item.p * item.q); totalVal += (item.p * item.q); });
                        var subtotalStr = it.cur === 'JPY'
                            ? '小計 NT ' + Math.round(personTotal * cfg.rate).toLocaleString() + '<span class="dai-item-jpy">（JPY ' + personTotal.toLocaleString() + '）</span>'
                            : '小計 ' + personTotal.toLocaleString();
                        detailH += '<div class="dai-person-block">';
                        if (d.person) {
                            detailH += '<div class="dai-person-row"><span class="dai-person-name">' + esc(d.person) + '</span><span class="dai-subtotal">' + subtotalStr + '</span></div>';
                        }
                        (d.items || []).forEach(function(item) {
                            var itemPriceStr = it.cur === 'JPY'
                                ? 'NT ' + Math.round(item.p * item.q * cfg.rate).toLocaleString() + '<span class="dai-item-jpy">（JPY ' + (item.p * item.q).toLocaleString() + '）</span>'
                                : (item.p * item.q).toLocaleString();
                            detailH += '<div class="dai-item-row"><span>' + esc(item.n) + ' (x' + esc(String(item.q)) + ')</span><span class="dai-item-price">' + itemPriceStr + '</span></div>';
                        });
                        detailH += '</div>';
                    });
                }

                if (it.note) detailH += '<div class="note-area">備註：' + esc(it.note) + '</div>';

                // 4. 日幣顯示：NT xxx 元（JPY xxx）
                var priceH;
                if (it.cur === 'JPY') {
                    var twd = Math.round(totalVal * cfg.rate);
                    priceH = 'NT ' + twd.toLocaleString() + ' 元<span class="jpy-tag">（JPY ' + totalVal.toLocaleString() + '）</span>';
                } else {
                    priceH = 'NT ' + totalVal.toLocaleString() + ' 元';
                }

                var dateStr = (it.yy || '') + (it.mm || '') + (it.dd || '');

                // 狀態標籤：空值不渲染
                var statHtml = '';
                if (it.stat) {
                    var statClass = 'stat-tag ';
                    if (it.stat === '待出貨') statClass += 'stat-pending';
                    else if (it.stat === '運送中') statClass += 'stat-shipping';
                    else if (it.stat === '已到貨') statClass += 'stat-arrived';
                    else statClass += 'stat-pending';
                    statHtml = '<div class="' + statClass + '">' + esc(it.stat) + '</div>';
                }

                // 搜尋用文字：名稱 + 來源 + 個人購買項目名稱 + 代購項目名稱
                var searchText = [it.name, it.src];
                if (it.me) it.me.forEach(function(m) { searchText.push(m.n); });
                if (it.dai) {
                    var daiSearch = it.dai;
                    if (daiSearch.length && daiSearch[0].person === undefined) {
                        daiSearch = [{person: '', items: daiSearch}];
                    }
                    daiSearch.forEach(function(d) {
                        if (d.person) searchText.push(d.person);
                        (d.items || []).forEach(function(item) { searchText.push(item.n); });
                    });
                }
                if (it.note) searchText.push(it.note);

                // 緊湊版日期：只顯示月日
                var mm = (it.mm || '').replace('月', '');
                var dd = (it.dd || '').replace('日', '');
                var compactDate = mm ? (mm + '月' + (dd ? dd + '日' : '')) : '';

                // 緊湊版價格：不含「元」
                var compactPrice = it.cur === 'JPY'
                    ? 'NT ' + Math.round(totalVal * cfg.rate).toLocaleString()
                    : 'NT ' + totalVal.toLocaleString();

                // 緊湊版狀態色塊
                var ccBarClass = 'cc-bar ';
                if (it.stat === '運送中') ccBarClass += 'cc-bar-shipping';
                else if (it.stat === '已到貨') ccBarClass += 'cc-bar-arrived';
                else ccBarClass += 'cc-bar-pending';

                var compactCard =
                    '<div class="cc-swipe-container" data-search="' + esc(searchText.join(' ')) + '">' +
                        '<div class="cc-swipe-area">' +
                            '<div class="swipe-btns">' +
                                '<button class="action-btn action-done" data-id="' + esc(it.id) + '" onclick="toggleDone(this.dataset.id)">' + (it.done ? '還原' : '封存') + '</button>' +
                                '<button class="action-btn action-del" data-id="' + esc(it.id) + '" onclick="delItem(this.dataset.id)">刪除</button>' +
                            '</div>' +
                            '<div class="card-compact" id="cc-card-' + esc(it.id) + '" ontouchstart="ccs(event)" ontouchmove="ccm(event,\'' + esc(it.id) + '\')" ontouchend="cce(event,\'' + esc(it.id) + '\')" style="' + (!hasDetail ? 'cursor:default;' : 'cursor:pointer;') + '">' +
                                '<div class="' + ccBarClass + '"></div>' +
                                '<div class="cc-body">' +
                                    '<div class="cc-name">' + esc(it.name) + '</div>' +
                                    '<div class="cc-sub">' + esc(it.src) + (compactDate ? '<span class="cc-sep">|</span>' + compactDate : '') + '</div>' +
                                '</div>' +
                                '<span class="cc-price">' + compactPrice + '</span>' +
                                '<div class="cc-btns">' +
                                    (hasDetail ? '<button class="cc-btn" id="cc-arrow-' + esc(it.id) + '" onclick="event.stopPropagation();toggleCompactBox(\'' + esc(it.id) + '\')">∨</button>' : '<div class="cc-placeholder"></div>') +
                                    '<button class="cc-btn" onclick="event.stopPropagation();openEdit(\'' + esc(it.id) + '\')">✎</button>' +
                                '</div>' +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                    (hasDetail ? '<div class="detail-compact" id="cc-box-' + esc(it.id) + '"><div class="detail-inner">' + detailH + '</div></div>' : '');

                return '<div class="swipe-container' + (it.pin ? ' pinned-container' : '') + '" data-search="' + esc(searchText.join(' ')) + '">' +
                    '<div class="swipe-area">' +
                        '<div class="swipe-btns">' +
                            '<button class="action-btn action-done" data-id="' + esc(it.id) + '" onclick="toggleDone(this.dataset.id)">' + (it.done ? '還原' : '封存') + '</button>' +
                            '<button class="action-btn action-del" data-id="' + esc(it.id) + '" onclick="delItem(this.dataset.id)">刪除</button>' +
                        '</div>' +
                        '<div class="card' + (it.pin ? ' pinned' : '') + '" id="card-' + esc(it.id) + '" ontouchstart="cs(event)" ontouchmove="cm(event,\'' + esc(it.id) + '\')" ontouchend="ce(event,\'' + esc(it.id) + '\')" style="' + (hasDetail ? 'cursor:pointer;' : '') + '">' +
                            statHtml +
                            '<div class="img-box" data-link="' + esc(it.link) + '" onclick="event.stopPropagation();if(this.dataset.link) window.open(this.dataset.link)">' +
                                (it.img ? '<img src="' + esc(it.img) + '" alt="">' : esc(it.src)) +
                            '</div>' +
                            '<div class="info">' +
                                '<div class="title-row"><span class="title">' + esc(it.name) + '</span><span class="src-text">' + esc(it.src) + '</span></div>' +
                                '<div class="date-text">' + esc(dateStr) + '</div>' +
                                '<div class="price-text">' + priceH + '</div>' +
                            '</div>' +
                            '<div class="ctrl-group">' +
                                (it.pin ? '<span class="pin-icon btn-icon" style="cursor:default;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v3.76z"/></svg></span>' : '') +
                                (hasDetail ? '<button class="btn-icon btn-toggle" data-id="' + esc(it.id) + '" onclick="event.stopPropagation();toggleBox(this.dataset.id)">∨</button>' : '') +
                                '<button class="btn-icon" data-id="' + esc(it.id) + '" onclick="event.stopPropagation();openEdit(this.dataset.id)">✎</button>' +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                    (hasDetail ? '<div id="box-' + esc(it.id) + '" class="detail-box"><div class="detail-inner">' + detailH + '</div></div>' : '') +
                    '<div class="no-detail-gap"></div>' +
                '</div>' +
                compactCard;
            }

            // 進行中列表
            // 進行中列表：置頂在前，有置頂時加分隔線
            var actH = '';
            if (pinned.length > 0) {

        var cX = 0, cY = 0, cMoved = false, cScrolled = false;
        function cs(e) {
            cX = e.touches[0].clientX;
            cY = e.touches[0].clientY;
            cMoved = false;
            cScrolled = false;
            e.stopPropagation();
        }
        function cm(e, id) {
            var m = e.touches[0].clientX - cX;
            var my = e.touches[0].clientY - cY;
            if (Math.abs(my) > Math.abs(m)) {
                cScrolled = true;
            } else if (Math.abs(m) > 5) {
                cMoved = true;
                if (m < 0 && m > -160) document.getElementById('card-' + id).style.transform = 'translateX(' + m + 'px)';
            }
            e.stopPropagation();
        }
        function ce(e, id) {
            var m = e.changedTouches[0].clientX - cX;
            var dy = Math.abs(e.changedTouches[0].clientY - cY);
            var c = document.getElementById('card-' + id);
            c.style.transition = 'transform 0.2s';

            if (cMoved && m < -60) {
                c.style.transform = 'translateX(-160px)';
                c.dataset.slid = '1';
            } else if (cMoved) {
                c.style.transform = 'translateX(0px)';
                c.dataset.slid = '0';
            } else if (cScrolled || dy > 10) {
                // 垂直滑動，不做任何事
            } else {
                var target = e.target.closest('.btn-icon');
                if (target) return;

                if (c.dataset.slid === '1') {
                    c.style.transform = 'translateX(0px)';
                    c.dataset.slid = '0';
                } else {
                    var hasDetail = document.getElementById('box-' + id) !== null;
                    if (hasDetail) toggleBox(id);
                }
            }
            e.stopPropagation();
        }

        }

        function openEdit(id) {

                : db.find(function(x) { return x.id === id; });

            // 新增/編輯 切換按鈕文字和標題
            document.getElementById('save-btn').textContent = (id === null) ? '新增' : '儲存';
            document.getElementById('edit-modal-title').textContent = (id === null) ? '新增事件' : '編輯事件';

            document.getElementById('in-name').value = it.name;
            document.getElementById('in-img').value = it.img;
            document.getElementById('in-link').value = it.link;
            document.getElementById('in-note').value = it.note;
            document.getElementById('in-stat').value = it.stat;
            // 日期轉換：yy/mm/dd → date picker 格式
            var yy = (it.yy || '').replace('年','');
            var mm = (it.mm || '').replace('月','').padStart(2,'0');
            var dd = (it.dd || '').replace('日','').padStart(2,'0');
            document.getElementById('in-date').value = (yy && mm) ? yy + '-' + (mm||'01') + '-' + (dd||'01') : (yy ? yy + '-01-01' : '');
            document.getElementById('in-cur').value = it.cur;
            document.getElementById('in-pin').checked = it.pin || false;

            var srcsRaw = cfg.srcs || '';
            var s = srcsRaw.indexOf('\n') >= 0
                ? srcsRaw.split('\n').map(function(x){ return x.trim(); }).filter(Boolean)
                : srcsRaw.split(',').map(function(x){ return x.trim(); }).filter(Boolean);
            var opt = '';
            s.forEach(function(x) { opt += '<option>' + esc(x) + '</option>'; });
            document.getElementById('in-src').innerHTML = opt;
            document.getElementById('in-src').value = it.src || (s[0] || '');

            document.getElementById('me-rows').innerHTML = '';
            (it.me && it.me.length ? it.me : [{n: '', p: '', q: ''}]).forEach(function(m) { addRow('me-rows', m); });
            document.getElementById('dai-persons').innerHTML = '';
            // 兼容舊格式 [{n,p,q}] → 轉成新格式 [{person:'', items:[...]}]
            var daiData = it.dai || [];

                daiData = [{person: '', items: daiData}];

        function saveItem() {
            var me = [], dai = [];
            document.querySelectorAll('#me-rows>div').forEach(function(r) {
                var n = r.querySelector('.d-n').value;
                if (n) me.push({n: n, p: parseFloat(r.querySelector('.d-p').value) || 0, q: parseInt(r.querySelector('.d-q').value) || 1});
            });
            document.querySelectorAll('#dai-persons .dai-person').forEach(function(personEl) {
                var person = personEl.querySelector('.dai-person-input').value.trim();
                var items = [];
                personEl.querySelectorAll('.dai-person-items > div').forEach(function(r) {
                    var n = r.querySelector('.d-n').value;
                    if (n) items.push({n: n, p: parseFloat(r.querySelector('.d-p').value) || 0, q: parseInt(r.querySelector('.d-q').value) || 1});
                });
                if (person || items.length) dai.push({person: person, items: items});
            });

            var dateVal = document.getElementById('in-date').value; // "2026-04-23" or ""
            var yySave = '', mmSave = '', ddSave = '';
            if (dateVal) {
                var parts = dateVal.split('-');
                yySave = parts[0] + '年';
                mmSave = parseInt(parts[1]) + '月';
                ddSave = parseInt(parts[2]) + '日';
            }
            var isNew = editId === null;
            var data = {
                name: document.getElementById('in-name').value || '未命名',
                src: document.getElementById('in-src').value,
                stat: document.getElementById('in-stat').value,
                yy: yySave,
                mm: mmSave,
                dd: ddSave,
                img: document.getElementById('in-img').value,
                link: document.getElementById('in-link').value,
                cur: document.getElementById('in-cur').value,
                note: document.getElementById('in-note').value,
                me: me,
                dai: dai,
                pin: document.getElementById('in-pin').checked
            };

            if (!isNew) {
                var idx = db.findIndex(function(x) { return x.id === editId; });
                if (idx > -1) {
                    data.id = editId;
                    data.done = db[idx].done;
                    db[idx] = data;
                }
            } else {
                data.id = String(Date.now());
                data.done = false;
                db.push(data);
            }
            save();
            render();
            updateDrawerInfo();
            closeModal('edit-modal');
            // 2. 儲存後 Toast 提示
            showToast(isNew ? '✓ 已新增「' + data.name + '」' : '✓ 已儲存');
        }

        function updateBackupHint() {
            var hint = document.getElementById('last-backup-hint');
            if (!hint) return;
            var t = localStorage.getItem('merch_last_backup');
            if (!t) { hint.textContent = '尚未備份過'; hint.style.color = '#a06060'; return; }
            var days = Math.floor((Date.now() - Number(t)) / 86400000);
            if (days === 0) { hint.textContent = '今天已備份 ✓'; hint.style.color = '#5a9a6a'; }
            else if (days <= 7) { hint.textContent = days + ' 天前備份'; hint.style.color = '#888'; }
            else { hint.textContent = days + ' 天未備份，建議匯出'; hint.style.color = '#a06060'; }
        }

        function filterSearch(q) {
            var kw = q.trim().toLowerCase();
            // 卡片模式
            document.querySelectorAll('#list-active .swipe-container, #list-archive .swipe-container').forEach(function(el) {
                var hide = kw && !(el.dataset.search || '').toLowerCase().includes(kw);
                el.style.display = hide ? 'none' : '';
                var next = el.nextElementSibling;
                if (next && next.classList.contains('detail-box')) next.style.display = hide ? 'none' : '';
                var gap = next && next.classList.contains('detail-box') ? next.nextElementSibling : next;
                if (gap && gap.classList.contains('no-detail-gap')) gap.style.display = hide ? 'none' : '';
            });
            // 列表模式
            document.querySelectorAll('#list-active .cc-swipe-container, #list-archive .cc-swipe-container').forEach(function(el) {
                var hide = kw && !(el.dataset.search || '').toLowerCase().includes(kw);
                el.style.display = hide ? 'none' : '';
                var next = el.nextElementSibling;
                if (next && next.classList.contains('detail-compact')) next.style.display = hide ? 'none' : '';
            });
        }

        function exportData() {
            var json = JSON.stringify(db, null, 2);
            var blob = new Blob([json], {type: 'application/json'});
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            var date = new Date().toISOString().slice(0,10);
            a.href = url;
            a.download = 'merch-backup-' + date + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            localStorage.setItem('merch_last_backup', Date.now());
            showToast('✓ 備份檔案已下載');
            updateBackupHint();
        }

        function importData() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        var parsed = JSON.parse(ev.target.result);
                        parsed.forEach(function(it) {
                            if (!it.id) it.id = String(Date.now() + Math.random());
                        });
                        db = parsed;
                        save(); render();
                        showToast('✓ 匯入成功，共 ' + db.length + ' 筆');
                    } catch(e) {
                        alert('格式錯誤，請確認備份檔案是否完整！');
                    }
                };
                reader.readAsText(file);
            };
            document.body.appendChild(input);
            input.click();
            document.body.removeChild(input);
        }

        (function migrateOldData() {
            var changed = false;
            var statMap = {'未發貨': '待出貨', '已發貨': '運送中', '集運中': '運送中', '已到貨': '已到貨'};
            db.forEach(function(it) {
                if (!it.id) { it.id = String(Date.now() + Math.random()); changed = true; }
                // 6. 舊狀態自動轉換
                if (it.stat && statMap[it.stat] && it.stat !== statMap[it.stat]) {
                    it.stat = statMap[it.stat]; changed = true;
                }
            });
            if (changed) save();
        })();
        // Service Worker 註冊
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</div>
</body>
</html>
